[project]
name = "glam-processing"
version = "0.4.4"
description = ""
authors = [{name = "John Keniston", email = "jfkeniston@gmail.com"}]
readme = "README.md"
requires-python = ">=3.12, <4.0"
dependencies = [
    "earthaccess (>=0.16.0,<0.17.0)",
    "rio-cogeo (>=7.0.1,<8.0.0)",
    "pyjwt>=2.9.0",
    "cryptography>=43.0.0",
    "h5py>=3.11.0",
    "rioxarray (>=0.21.0,<0.22.0)",
    "beautifulsoup4>=4.12.3",
    "rasterio (>=1.5.0,<2.0.0)",
    "boto3>=1.26.0,<2.0.0",
]

[project.scripts]
glam = "glam_processing.cli:cli"

[tool.poetry]

[tool.poetry.group.dev.dependencies]
ipython = "^8.26.0"
notebook = "^7.2.1"
python-semantic-release = "^9.8.8"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.semantic_release]
version_toml = [
    "pyproject.toml:project.version",
]
assets = []
build_command_env = []
commit_message = "{version}\n\nAutomatically generated by python-semantic-release"
commit_parser = "angular"
logging_use_named_masks = false
major_on_zero = true
allow_zero_version = true
no_git_verify = false
tag_format = "v{version}"

[tool.semantic_release.branches.main]
match = "(main|master)"
prerelease_token = "rc"
prerelease = false

[tool.semantic_release.changelog]
template_dir = "templates"
changelog_file = "CHANGELOG.md"
exclude_commit_patterns = []

[tool.semantic_release.changelog.environment]
block_start_string = "{%"
block_end_string = "%}"
variable_start_string = "{{"
variable_end_string = "}}"
comment_start_string = "{#"
comment_end_string = "#}"
trim_blocks = false
lstrip_blocks = false
newline_sequence = "\n"
keep_trailing_newline = false
extensions = []
autoescape = true

[tool.semantic_release.commit_author]
env = "GIT_COMMIT_AUTHOR"
default = "semantic-release <semantic-release>"

[tool.semantic_release.commit_parser_options]
allowed_tags = ["build", "chore", "ci", "docs", "feat", "fix", "perf", "style", "refactor", "test"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]
default_bump_level = 0

[tool.semantic_release.remote]
name = "origin"
type = "github"
ignore_token_for_push = false
insecure = false

[tool.semantic_release.remote.token]
env = "GH_TOKEN"

[tool.semantic_release.publish]
dist_glob_patterns = ["dist/*"]
upload_to_vcs_release = true

